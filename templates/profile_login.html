<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jugendstil Möbel - Авторизация</title>
    <link rel="stylesheet" href="/static/style.css?v=9999">
</head>
<body class="catalog-body">

    <!-- Обертка абсолютного геометрического центрирования -->
    <main class="profile-screen-wrapper">
        <!-- ЕДИНАЯ МОНОЛИТНАЯ ЛАТУННАЯ РАМКА ДЛЯ ВСЕХ ПОЛЕЙ -->
        <div class="profile-bordered-box-register" style="max-width: 500px; width: 100%;">
            <header class="auth-header" style="text-align: center;">
                <h1>Jugendstil Möbel</h1>
                <p>Вход в личный кабинет покупателя</p>
            </header>

            <!-- ПРЯМАЯ НА ТИВНАЯ ОТПРАВКА НА FLASK-РОУТ PROFILE_LOGIN ПОД ЧИСТЫЙ POST БЕЗ JS -->
            <form action="/profile_login" method="POST" class="profile-auth-form-clean">
                
                <!-- Поле ввода Логина -->
                <div class="input-group-profile">
                    <label>Логин</label>
                    <input type="text" name="login" placeholder="Введите ваш логин" required>
                </div>

                <!-- Поле ввода Пароля -->
                <div class="input-group-profile" style="position: relative;">
                    <label>Пароль</label>
                    <input type="password" id="userLogPassword" name="password" placeholder="••••••••" required>
                    <button type="button" id="toggleLogPassword" class="btn-toggle-eye"></button>
                </div>

                <!-- Парадная кнопка отправки формы -->
                <div class="btn-container-fixed">
                    <button type="submit" class="btn-submit-register">Войти</button>
                </div>
            </form>

            <div style="text-align: center; margin-top: 25px; width: 100%;">
                <a href="/user/profile" style="color: #a39072; font-size: 13px; text-decoration: none; display: inline-block;">← Назад к выбору действий</a>
            </div>
        </div>
    </main>

    <!-- Скрипт подключается только для работы латунного глазика пароля -->
    <script src="/static/site.js?v=9999"></script>
</body>
</html>
